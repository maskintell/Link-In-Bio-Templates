<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINKS | DARK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #050505;
            color: #ffffff;
            min-height: 100vh;
            padding: 0;
            overflow-x: hidden;
        }

        /* Chaotic background pattern - subtle grid for dark mode */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        /* Header Section */
        .header {
            border: 8px solid #ffffff;
            padding: 40px;
            background: #000000;
            margin-bottom: 30px;
            position: relative;
            box-shadow: 16px 16px 0 rgba(255, 255, 255, 0.05);
            animation: slideInDown 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-100px) rotate(-5deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotate(0);
            }
        }

        .header::before {
            content: '';
            position: absolute;
            top: -8px;
            right: -8px;
            width: 60px;
            height: 60px;
            background: #ff0055;
            z-index: -1;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border: 6px solid #ffffff;
            object-fit: cover;
            flex-shrink: 0;
            filter: grayscale(100%) contrast(1.2);
            transition: all 0.3s ease;
        }

        .profile-img:hover {
            filter: grayscale(0%) contrast(1);
            transform: rotate(-5deg) scale(1.05);
        }

        .profile-text h1 {
            font-size: 48px;
            font-weight: 900;
            line-height: 0.9;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: -2px;
            color: #ffffff;
        }

        .profile-text p {
            font-size: 18px;
            font-weight: 700;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .warning-banner {
            background: #ffffff;
            color: #000000;
            padding: 12px 20px;
            margin-top: 20px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 4px solid #ff0055;
            position: relative;
            overflow: hidden;
        }

        .warning-banner::before {
            content: '⚠';
            position: absolute;
            left: -10px;
            font-size: 40px;
            opacity: 0.2;
            animation: slideWarning 10s linear infinite;
        }

        @keyframes slideWarning {
            from { left: -50px; }
            to { left: 100%; }
        }

        /* Links Section */
        .links {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .link-item {
            border: 6px solid #ffffff;
            background: #000000;
            padding: 0;
            text-decoration: none;
            color: #ffffff;
            display: block;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 12px 12px 0 rgba(255, 255, 255, 0.05);
            animation: slideInLeft 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) backwards;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-100px) rotate(-10deg);
            }
            to {
                opacity: 1;
                transform: translateX(0) rotate(0);
            }
        }

        /* Vibrant Dark Mode Colors */
        .link-item:nth-child(1)::before { background: #ff0055; }
        .link-item:nth-child(2)::before { background: #00ff99; }
        .link-item:nth-child(3)::before { background: #0066ff; }
        .link-item:nth-child(4)::before { background: #fdfd00; }
        .link-item:nth-child(5)::before { background: #cc00ff; }

        .link-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 12px;
            height: 100%;
            transition: width 0.3s ease;
        }

        .link-item:hover {
            transform: translateX(12px) rotate(-2deg);
            box-shadow: 20px 20px 0 rgba(255, 255, 255, 0.1);
            border-color: #ffffff;
        }

        .link-item:hover::before {
            width: 100%;
        }

        .link-content {
            padding: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            z-index: 1;
            background: #000000;
            transition: background 0.3s ease;
        }

        .link-item:hover .link-content {
            background: transparent;
        }

        .link-number {
            font-size: 60px;
            font-weight: 900;
            line-height: 1;
            color: #ffffff;
            min-width: 80px;
            transition: all 0.3s ease;
        }

        .link-item:hover .link-number {
            color: #000000;
            transform: scale(1.2) rotate(-10deg);
        }

        .link-text {
            flex: 1;
        }

        .link-title {
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 4px;
            line-height: 1.1;
            transition: color 0.3s ease;
        }

        .link-item:hover .link-title {
            color: #000000;
        }

        .link-description {
            font-size: 14px;
            font-weight: 700;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        .link-item:hover .link-description {
            color: rgba(0, 0, 0, 0.8);
        }

        .link-arrow {
            font-size: 40px;
            font-weight: 900;
            transition: all 0.3s ease;
        }

        .link-item:hover .link-arrow {
            color: #000000;
            transform: translateX(10px) scale(1.3);
        }

        /* Social Section */
        .social-section {
            margin-top: 40px;
            border: 6px solid #ffffff;
            background: #111111;
            color: #ffffff;
            padding: 30px;
            box-shadow: 12px 12px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            animation: slideInUp 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) 0.6s backwards;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(100px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .social-section::before {
            content: '';
            position: absolute;
            top: -6px;
            left: -6px;
            width: 40px;
            height: 40px;
            background: #00ff99;
        }

        .social-title {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .social-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 12px;
        }

        .social-link {
            border: 4px solid #ffffff;
            padding: 16px;
            text-align: center;
            text-decoration: none;
            color: #ffffff;
            font-weight: 900;
            font-size: 14px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .social-link::before {
            content: '';
            position: absolute;
            inset: 0;
            background: #ffffff;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .social-link:hover::before {
            transform: scaleX(1);
        }

        .social-link:hover {
            color: #000000;
            transform: translateY(-4px);
        }

        .social-link i, .social-link span {
            position: relative;
            z-index: 1;
        }

        /* Footer */
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888888;
            padding: 20px;
            border-top: 4px solid #ffffff;
            border-bottom: 4px solid #ffffff;
        }

        /* Noise texture */
        .noise {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 999;
            mix-blend-mode: overlay;
        }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            .header { padding: 30px 20px; }
            .profile-section { flex-direction: column; text-align: center; gap: 20px; }
            .profile-text h1 { font-size: 36px; }
            .link-content { padding: 20px; }
            .link-number { font-size: 40px; min-width: 60px; }
            .link-title { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="profile-section">
                <img src="https://i.pravatar.cc/240" alt="Profile" class="profile-img">
                <div class="profile-text">
                    <h1>JORDAN<br>BLAKE</h1>
                    <p>Designer / Developer / Creator</p>
                </div>
            </div>
            <div class="warning-banner">
                ⚠ ATTENTION: DARK MODE ACTIVATED ⚠
            </div>
        </div>

        <!-- Links -->
        <div class="links">
            <a href="#" class="link-item">
                <div class="link-content">
                    <div class="link-number">01</div>
                    <div class="link-text">
                        <div class="link-title">PORTFOLIO</div>
                        <div class="link-description">View My Work</div>
                    </div>
                    <div class="link-arrow">→</div>
                </div>
            </a>

            <a href="#" class="link-item">
                <div class="link-content">
                    <div class="link-number">02</div>
                    <div class="link-text">
                        <div class="link-title">BLOG</div>
                        <div class="link-description">Read My Thoughts</div>
                    </div>
                    <div class="link-arrow">→</div>
                </div>
            </a>

            <a href="#" class="link-item">
                <div class="link-content">
                    <div class="link-number">03</div>
                    <div class="link-text">
                        <div class="link-title">SHOP</div>
                        <div class="link-description">Buy My Products</div>
                    </div>
                    <div class="link-arrow">→</div>
                </div>
            </a>

            <a href="#" class="link-item">
                <div class="link-content">
                    <div class="link-number">04</div>
                    <div class="link-text">
                        <div class="link-title">YOUTUBE</div>
                        <div class="link-description">Watch My Videos</div>
                    </div>
                    <div class="link-arrow">→</div>
                </div>
            </a>

            <a href="#" class="link-item">
                <div class="link-content">
                    <div class="link-number">05</div>
                    <div class="link-text">
                        <div class="link-title">CONTACT</div>
                        <div class="link-description">Get In Touch</div>
                    </div>
                    <div class="link-arrow">→</div>
                </div>
            </a>
        </div>

        <!-- Social Section -->
        <div class="social-section">
            <div class="social-title">// CONNECT</div>
            <div class="social-links">
                <a href="#" class="social-link">
                    <i class="fab fa-twitter"></i>
                    <span>X.COM</span>
                </a>
                <a href="#" class="social-link">
                    <i class="fab fa-instagram"></i>
                    <span>IG</span>
                </a>
                <a href="#" class="social-link">
                    <i class="fab fa-github"></i>
                    <span>GH</span>
                </a>
                <a href="#" class="social-link">
                    <i class="fab fa-linkedin-in"></i>
                    <span>IN</span>
                </a>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            Built with ⚡ by <a href="https://mask-intelligence.web.app" target="_blank" style="color: #fff; text-decoration: underline;">MASK INTELLIGENCE</a>
        </div>
    </div>

    <script>
        // Add chaotic mouse trail effect with neon colors
        const colors = ['#ff0055', '#00ff99', '#0066ff', '#fdfd00', '#cc00ff'];
        let colorIndex = 0;

        document.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.94) {
                const trail = document.createElement('div');
                trail.style.position = 'fixed';
                trail.style.left = e.clientX + 'px';
                trail.style.top = e.clientY + 'px';
                trail.style.width = '12px';
                trail.style.height = '12px';
                trail.style.background = colors[colorIndex % colors.length];
                trail.style.pointerEvents = 'none';
                trail.style.zIndex = '999';
                trail.style.border = '2px solid #fff';
                
                document.body.appendChild(trail);
                
                setTimeout(() => {
                    trail.style.transition = 'all 0.4s ease';
                    trail.style.opacity = '0';
                    trail.style.transform = 'translateY(20px) scale(0) rotate(45deg)';
                }, 10);
                
                setTimeout(() => { trail.remove(); }, 410);
                colorIndex++;
            }
        });

        // Glitch effect on hover
        document.querySelectorAll('.link-item').forEach(link => {
            link.addEventListener('mouseenter', function() {
                const title = this.querySelector('.link-title');
                const originalText = title.textContent;
                const glitchChars = 'X010X█▒░';
                
                title.textContent = glitchChars[Math.floor(Math.random() * glitchChars.length)].repeat(originalText.length);
                setTimeout(() => { title.textContent = originalText; }, 70);
            });
        });
    </script>
</body>
</html>
